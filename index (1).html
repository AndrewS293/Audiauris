<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURALUX — Audio Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #10101c;
      --border: rgba(255,255,255,0.06);
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --accent: #a78bfa;
      --accent2: #f472b6;
      --glow: rgba(167,139,250,0.3);
    }

    /* ── THEMES ── */
    [data-theme="aurora"] {
      --c1: #00f5c8; --c2: #00aaff; --c3: #8b5cf6; --c4: #f472b6;
      --glow-clr: rgba(0,245,200,0.25); --name: "AURORA";
    }
    [data-theme="ember"] {
      --c1: #ff6b00; --c2: #ff3366; --c3: #ffcc00; --c4: #ff8800;
      --glow-clr: rgba(255,107,0,0.3); --name: "EMBER";
    }
    [data-theme="glacier"] {
      --c1: #e0f7fa; --c2: #80deea; --c3: #26c6da; --c4: #00838f;
      --glow-clr: rgba(224,247,250,0.2); --name: "GLACIER";
    }
    [data-theme="venom"] {
      --c1: #39ff14; --c2: #00ff88; --c3: #aaff00; --c4: #00cc44;
      --glow-clr: rgba(57,255,20,0.25); --name: "VENOM";
    }
    [data-theme="sakura"] {
      --c1: #ff9ec4; --c2: #ffb3d1; --c3: #ff6fa8; --c4: #ffd6e7;
      --glow-clr: rgba(255,158,196,0.3); --name: "SAKURA";
    }
    [data-theme="void"] {
      --c1: #6600ff; --c2: #0044ff; --c3: #aa00ff; --c4: #3300cc;
      --glow-clr: rgba(102,0,255,0.35); --name: "VOID";
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      user-select: none;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--c1, #a78bfa), var(--c3, #f472b6));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: all 0.5s ease;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 100px;
      transition: all 0.3s ease;
    }

    .status-pill.active {
      color: var(--c1, #a78bfa);
      border-color: var(--c1, #a78bfa);
      box-shadow: 0 0 12px var(--glow-clr, rgba(167,139,250,0.2));
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: all 0.3s;
    }
    .status-pill.active .dot {
      background: var(--c1, #a78bfa);
      box-shadow: 0 0 6px var(--c1, #a78bfa);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── CANVAS AREA ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── IDLE SCREEN ── */
    #idle {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.6s ease;
    }

    #idle.hidden { opacity: 0; pointer-events: none; }

    .idle-ring {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .idle-ring::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--c1, #a78bfa), var(--c3, #f472b6), transparent);
      animation: spin 4s linear infinite;
      opacity: 0.4;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .idle-icon {
      font-size: 2.2rem;
      filter: grayscale(0.5);
    }

    .idle-text {
      text-align: center;
    }
    .idle-text h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      margin-bottom: 6px;
      color: var(--text);
    }
    .idle-text p {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      max-width: 280px;
      line-height: 1.7;
    }

    /* ── CONTROLS ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
    }

    .btn-group { display: flex; gap: 10px; align-items: center; }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--c1, #a78bfa);
      color: var(--c1, #a78bfa);
      box-shadow: 0 0 10px var(--glow-clr, rgba(167,139,250,0.15));
    }

    .btn.primary {
      background: var(--c1, #a78bfa);
      color: #08080f;
      border-color: var(--c1, #a78bfa);
      font-weight: 500;
    }
    .btn.primary:hover {
      filter: brightness(1.15);
      color: #08080f;
      box-shadow: 0 0 16px var(--glow-clr, rgba(167,139,250,0.4));
    }
    .btn.danger { border-color: rgba(255,60,60,0.3); color: rgba(255,100,100,0.7); }
    .btn.danger:hover { border-color: #ff4444; color: #ff4444; box-shadow: 0 0 10px rgba(255,68,68,0.2); }

    /* ── MODE SELECTOR ── */
    .mode-tabs {
      display: flex;
      gap: 6px;
    }

    .mode-tab {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
    }
    .mode-tab.active {
      border-color: var(--c1, #a78bfa);
      color: var(--c1, #a78bfa);
      background: rgba(255,255,255,0.03);
    }

    /* ── THEME SWATCHES ── */
    .theme-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .swatch {
      width: 20px; height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      position: relative;
    }
    .swatch.active { border-color: white; transform: scale(1.2); }
    .swatch[data-theme="aurora"] { background: linear-gradient(135deg, #00f5c8, #8b5cf6); }
    .swatch[data-theme="ember"]  { background: linear-gradient(135deg, #ff6b00, #ff3366); }
    .swatch[data-theme="glacier"]{ background: linear-gradient(135deg, #e0f7fa, #00838f); }
    .swatch[data-theme="venom"]  { background: linear-gradient(135deg, #39ff14, #00cc44); }
    .swatch[data-theme="sakura"] { background: linear-gradient(135deg, #ff9ec4, #ff6fa8); }
    .swatch[data-theme="void"]   { background: linear-gradient(135deg, #6600ff, #0044ff); }

    /* ── LEVEL METER ── */
    .level-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .level-bar {
      width: 80px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .level-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--c1, #a78bfa), var(--c3, #f472b6));
      border-radius: 2px;
      width: 0%;
      transition: width 0.08s;
    }

    /* ── SOURCE MODAL ── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(4,4,10,0.85);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #modal-overlay.visible { opacity: 1; pointer-events: all; }

    .modal {
      background: #0e0e1a;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      width: 340px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .modal h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.15em;
      color: var(--text);
    }
    .modal p {
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.7;
      letter-spacing: 0.06em;
    }

    .source-options { display: flex; flex-direction: column; gap: 10px; }

    .source-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      padding: 14px 18px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      text-align: left;
      display: flex; align-items: center; gap: 12px;
      transition: all 0.2s;
    }
    .source-btn:hover {
      border-color: var(--c1, #a78bfa);
      background: rgba(255,255,255,0.03);
      box-shadow: 0 0 14px var(--glow-clr, rgba(167,139,250,0.15));
    }
    .source-btn .src-icon { font-size: 1.3rem; }
    .source-btn .src-label { display: flex; flex-direction: column; gap: 3px; }
    .source-btn .src-title { color: var(--text); }
    .source-btn .src-desc  { font-size: 0.62rem; color: var(--muted); }

    .modal-cancel {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      text-align: center;
      transition: color 0.2s;
    }
    .modal-cancel:hover { color: var(--text); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #1a0a0a; border: 1px solid rgba(255,80,80,0.3);
      color: rgba(255,140,140,0.9);
      font-size: 0.68rem; letter-spacing: 0.08em;
      padding: 10px 20px; border-radius: 6px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 200;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body data-theme="aurora">
<div id="app">

  <header>
    <div class="logo">AURALUX</div>
    <div id="status" class="status-pill">
      <div class="dot"></div>
      <span id="status-text">STANDBY</span>
    </div>
    <div class="level-wrap">
      <span>LEVEL</span>
      <div class="level-bar"><div class="level-fill" id="level-fill"></div></div>
    </div>
  </header>

  <div id="canvas-wrap">
    <canvas id="viz"></canvas>
    <div id="idle">
      <div class="idle-ring"><div class="idle-icon">◎</div></div>
      <div class="idle-text">
        <h2>READY TO VISUALIZE</h2>
        <p>Capture system audio — works even with speakers or headphones connected.</p>
      </div>
    </div>
  </div>

  <!-- Source picker modal -->
  <div id="modal-overlay">
    <div class="modal">
      <h3>SELECT AUDIO SOURCE</h3>
      <p>Choose how to capture audio. System audio works with speakers or headphones connected — open this file in a browser tab for best results.</p>
      <div class="source-options">
        <button class="source-btn" id="src-system">
          <span class="src-icon">🖥️</span>
          <span class="src-label">
            <span class="src-title">SYSTEM AUDIO</span>
            <span class="src-desc">Capture everything playing on your device</span>
          </span>
        </button>
        <button class="source-btn" id="src-mic">
          <span class="src-icon">🎙️</span>
          <span class="src-label">
            <span class="src-title">MICROPHONE</span>
            <span class="src-desc">Use mic input — works in all environments</span>
          </span>
        </button>
      </div>
      <button class="modal-cancel" id="modal-cancel">CANCEL</button>
    </div>
  </div>

  <div id="toast"></div>

  <footer>
    <div class="btn-group">
      <button class="btn primary" id="btn-start">▶ CAPTURE AUDIO</button>
      <button class="btn danger" id="btn-stop" style="display:none">■ STOP</button>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="bars">BARS</button>
      <button class="mode-tab" data-mode="wave">WAVE</button>
      <button class="mode-tab" data-mode="radial">RADIAL</button>
      <button class="mode-tab" data-mode="particles">PARTICLES</button>
    </div>

    <div class="theme-row">
      <div class="swatch active" data-theme="aurora" title="Aurora"></div>
      <div class="swatch" data-theme="ember"   title="Ember"></div>
      <div class="swatch" data-theme="glacier" title="Glacier"></div>
      <div class="swatch" data-theme="venom"   title="Venom"></div>
      <div class="swatch" data-theme="sakura"  title="Sakura"></div>
      <div class="swatch" data-theme="void"    title="Void"></div>
    </div>
  </footer>

</div>

<script>
// ─────────────────────────────────────────────
// AURALUX — Audio Visualizer Engine
// ─────────────────────────────────────────────

const canvas = document.getElementById('viz');
const ctx    = canvas.getContext('2d');
const idle   = document.getElementById('idle');
const status = document.getElementById('status');
const statusText = document.getElementById('status-text');
const levelFill  = document.getElementById('level-fill');
const btnStart   = document.getElementById('btn-start');
const btnStop    = document.getElementById('btn-stop');
const modalOverlay = document.getElementById('modal-overlay');
const toastEl      = document.getElementById('toast');

let audioCtx, analyser, source, stream;
let animId;
let isRunning = false;
let mode = 'bars';
let theme = 'aurora';

// ── Toast ──
function toast(msg, duration = 3500) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), duration);
}

// ── Theme color extraction ──
function getThemeColors() {
  const s = getComputedStyle(document.body);
  return {
    c1: s.getPropertyValue('--c1').trim(),
    c2: s.getPropertyValue('--c2').trim(),
    c3: s.getPropertyValue('--c3').trim(),
    c4: s.getPropertyValue('--c4').trim(),
  };
}

// ── Resize ──
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth  * window.devicePixelRatio;
  canvas.height = wrap.clientHeight * window.devicePixelRatio;
  canvas.style.width  = wrap.clientWidth  + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── Modal ──
function showModal() { modalOverlay.classList.add('visible'); }
function hideModal() { modalOverlay.classList.remove('visible'); }

document.getElementById('src-system').addEventListener('click', () => {
  hideModal(); startSystemCapture();
});
document.getElementById('src-mic').addEventListener('click', () => {
  hideModal(); startMicCapture();
});
document.getElementById('modal-cancel').addEventListener('click', hideModal);

// ── System audio via getDisplayMedia ──
async function startSystemCapture() {
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { width: 1, height: 1, frameRate: 1 },
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        sampleRate: 44100,
      }
    });

    const audioTracks = stream.getAudioTracks();
    if (!audioTracks.length) {
      stream.getTracks().forEach(t => t.stop());
      toast('No audio track detected — make sure to enable "Share audio" in the dialog.');
      return;
    }

    initAnalyser(stream, 'SYSTEM');
  } catch (err) {
    if (err.name === 'AbortError' || err.name === 'NotAllowedError') return;
    if (err.name === 'NotSupportedError' || err.message.includes('permissions policy')) {
      toast('System capture blocked here — open as a local file in Chrome/Edge, or use Microphone instead.');
    } else {
      toast('Could not capture system audio: ' + err.message);
    }
  }
}

// ── Microphone via getUserMedia ──
async function startMicCapture() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false,
      }
    });
    initAnalyser(stream, 'MIC');
  } catch (err) {
    if (err.name === 'NotAllowedError') {
      toast('Microphone access denied. Please allow mic permissions and try again.');
    } else {
      toast('Could not access microphone: ' + err.message);
    }
  }
}

// ── Shared audio init ──
function initAnalyser(s, label) {
  stream = s;
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;

  source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  stream.getTracks().forEach(track => {
    track.addEventListener('ended', () => stopCapture());
  });

  isRunning = true;
  idle.classList.add('hidden');
  status.classList.add('active');
  statusText.textContent = label;
  btnStart.style.display = 'none';
  btnStop.style.display  = '';

  draw();
}

function stopCapture() {
  isRunning = false;
  cancelAnimationFrame(animId);
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  audioCtx = analyser = source = stream = null;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  idle.classList.remove('hidden');
  status.classList.remove('active');
  statusText.textContent = 'STANDBY';
  levelFill.style.width  = '0%';
  btnStart.style.display = '';
  btnStop.style.display  = 'none';
}

// ── Draw loop ──
let particles = [];

function draw() {
  if (!isRunning) return;
  animId = requestAnimationFrame(draw);

  const W = canvas.width, H = canvas.height;
  const bufLen = analyser.frequencyBinCount;
  const freqData = new Uint8Array(bufLen);
  const timeData = new Uint8Array(analyser.fftSize);
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  const avg = freqData.reduce((a, b) => a + b, 0) / bufLen;
  levelFill.style.width = Math.min(100, avg / 128 * 100) + '%';

  const c = getThemeColors();

  ctx.fillStyle = 'rgba(8,8,16,0.18)';
  ctx.fillRect(0, 0, W, H);

  switch (mode) {
    case 'bars':      drawBars(W, H, freqData, c);           break;
    case 'wave':      drawWave(W, H, timeData, c);           break;
    case 'radial':    drawRadial(W, H, freqData, c);         break;
    case 'particles': drawParticles(W, H, freqData, timeData, c); break;
  }
}

// ── BARS ──
function drawBars(W, H, freqData, c) {
  const count = 120;
  const barW   = (W / count) * 0.7;
  const gap    = (W / count) * 0.3;
  const step   = Math.floor(freqData.length / count);

  for (let i = 0; i < count; i++) {
    const val  = freqData[i * step] / 255;
    const barH = val * H * 0.85;
    const x    = i * (barW + gap) + gap / 2;
    const y    = H - barH;

    // Color gradient based on frequency position
    const t = i / count;
    const grad = ctx.createLinearGradient(x, H, x, y);
    grad.addColorStop(0,   hexAlpha(c.c1, 0.9));
    grad.addColorStop(0.5, hexAlpha(c.c2, 0.8));
    grad.addColorStop(1,   hexAlpha(c.c3, 0.6));
    ctx.fillStyle = grad;

    // Rounded top
    const r = Math.min(barW / 2, 4);
    ctx.beginPath();
    ctx.moveTo(x, H);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.lineTo(x + barW - r, y);
    ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
    ctx.lineTo(x + barW, H);
    ctx.closePath();
    ctx.fill();

    // Glow cap
    if (val > 0.3) {
      ctx.shadowBlur = 12 * val;
      ctx.shadowColor = c.c1;
      ctx.fillStyle = c.c1;
      ctx.fillRect(x, y - 2, barW, 2);
      ctx.shadowBlur = 0;
    }

    // Mirror below (subtle)
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = grad;
    ctx.fillRect(x, H, barW, barH * 0.3);
    ctx.globalAlpha = 1;
  }
}

// ── WAVE ──
function drawWave(W, H, timeData, c) {
  const midY = H / 2;
  const sliceW = W / timeData.length;

  // Draw 3 layered waves with slight offsets for depth
  for (let layer = 2; layer >= 0; layer--) {
    const offset = (layer - 1) * (H * 0.06);
    const alpha  = [0.15, 0.35, 0.9][layer];
    const color  = [c.c3, c.c2, c.c1][layer];

    ctx.beginPath();
    ctx.moveTo(0, midY + offset);

    for (let i = 0; i < timeData.length; i++) {
      const v = (timeData[i] / 128) - 1;
      const x = i * sliceW;
      const y = midY + (v * H * 0.38) + offset;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }

    ctx.strokeStyle = hexAlpha(color, alpha);
    ctx.lineWidth   = layer === 2 ? 2.5 : 1;
    ctx.shadowBlur  = layer === 2 ? 18 : 0;
    ctx.shadowColor = color;
    ctx.stroke();
    ctx.shadowBlur  = 0;
  }

  // Center line
  ctx.beginPath();
  ctx.moveTo(0, midY);
  ctx.lineTo(W, midY);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ── RADIAL ──
function drawRadial(W, H, freqData, c) {
  const cx = W / 2, cy = H / 2;
  const count = 256;
  const step  = Math.floor(freqData.length / count);
  const baseR = Math.min(W, H) * 0.2;
  const maxR  = Math.min(W, H) * 0.42;

  // Rotating outer glow ring
  const t = Date.now() / 1000;
  const ringGrad = ctx.createRadialGradient(cx, cy, baseR * 0.9, cx, cy, baseR * 1.05);
  ringGrad.addColorStop(0, hexAlpha(c.c1, 0.0));
  ringGrad.addColorStop(0.5, hexAlpha(c.c1, 0.08));
  ringGrad.addColorStop(1, hexAlpha(c.c1, 0.0));
  ctx.beginPath();
  ctx.arc(cx, cy, baseR, 0, Math.PI * 2);
  ctx.strokeStyle = hexAlpha(c.c1, 0.12);
  ctx.lineWidth = 1;
  ctx.stroke();

  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
    const val   = freqData[i * step] / 255;
    const r1    = baseR + 2;
    const r2    = baseR + val * (maxR - baseR);

    const x1 = cx + Math.cos(angle) * r1;
    const y1 = cy + Math.sin(angle) * r1;
    const x2 = cx + Math.cos(angle) * r2;
    const y2 = cy + Math.sin(angle) * r2;

    const t = i / count;
    let color;
    if (t < 0.33)      color = lerpColor(c.c1, c.c2, t / 0.33);
    else if (t < 0.66) color = lerpColor(c.c2, c.c3, (t - 0.33) / 0.33);
    else               color = lerpColor(c.c3, c.c4, (t - 0.66) / 0.34);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = hexAlpha(color, 0.85 * val + 0.1);
    ctx.lineWidth   = 1.5;

    if (val > 0.7) {
      ctx.shadowBlur  = 8 * val;
      ctx.shadowColor = color;
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Center dot
  const avgLow = [...freqData.slice(0, 20)].reduce((a,b)=>a+b,0) / 20 / 255;
  const dotR   = 6 + avgLow * 14;
  const dotGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, dotR);
  dotGrad.addColorStop(0, c.c1);
  dotGrad.addColorStop(1, hexAlpha(c.c1, 0));
  ctx.beginPath();
  ctx.arc(cx, cy, dotR, 0, Math.PI * 2);
  ctx.fillStyle = dotGrad;
  ctx.fill();
}

// ── PARTICLES ──
const MAX_PARTICLES = 180;

function drawParticles(W, H, freqData, timeData, c) {
  const cx = W / 2, cy = H / 2;

  // Spawn particles on beats
  const avgHigh = [...freqData.slice(50, 150)].reduce((a,b)=>a+b,0) / 100 / 255;
  const avgLow  = [...freqData.slice(0, 20)].reduce((a,b)=>a+b,0)  / 20  / 255;

  if (avgLow > 0.45 && particles.length < MAX_PARTICLES) {
    const count = Math.floor(avgLow * 6);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 4 * avgLow;
      const colorChoice = [c.c1, c.c2, c.c3, c.c4][Math.floor(Math.random() * 4)];
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1.0,
        decay: 0.012 + Math.random() * 0.01,
        size: 1.5 + Math.random() * 3,
        color: colorChoice
      });
    }
  }

  // Waveform backdrop
  const sliceW = W / timeData.length;
  ctx.beginPath();
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] / 128) - 1;
    const x = i * sliceW;
    const y = cy + v * H * 0.18;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = hexAlpha(c.c2, 0.18);
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Update & draw particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = hexAlpha(p.color, p.life * 0.9);
    ctx.shadowBlur = 10 * p.life;
    ctx.shadowColor = p.color;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Beat pulse ring
  if (avgLow > 0.5) {
    const r = 30 + avgLow * Math.min(W, H) * 0.35;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = hexAlpha(c.c1, avgLow * 0.4);
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ── Helpers ──
function hexAlpha(hex, alpha) {
  hex = hex.trim();
  if (hex.startsWith('rgb')) {
    const [r,g,b] = hex.match(/\d+/g);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function lerpColor(a, b, t) {
  a = a.trim(); b = b.trim();
  const pa = a.startsWith('rgb') ? a.match(/\d+/g).map(Number) : [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
  const pb = b.startsWith('rgb') ? b.match(/\d+/g).map(Number) : [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
  const r = Math.round(pa[0] + (pb[0] - pa[0]) * t);
  const g = Math.round(pa[1] + (pb[1] - pa[1]) * t);
  const bl= Math.round(pa[2] + (pb[2] - pa[2]) * t);
  return `rgb(${r},${g},${bl})`;
}

// ── Event Listeners ──
btnStart.addEventListener('click', showModal);
btnStop .addEventListener('click', stopCapture);

document.querySelectorAll('.mode-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    particles = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });
});

document.querySelectorAll('.swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    theme = sw.dataset.theme;
    document.body.dataset.theme = theme;
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); isRunning ? stopCapture() : showModal(); }
  if (e.key === '1') document.querySelector('[data-mode="bars"]').click();
  if (e.key === '2') document.querySelector('[data-mode="wave"]').click();
  if (e.key === '3') document.querySelector('[data-mode="radial"]').click();
  if (e.key === '4') document.querySelector('[data-mode="particles"]').click();
});
